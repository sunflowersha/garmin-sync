name: Send Training Notifications

on:
  schedule:
    # Queued at 00:30 UTC (02:30 SAST) because GitHub cron is best-effort and
    # often hours late; the first job step then sleeps until exactly
    # 03:30 UTC (05:30 SAST) before sending. Sundays auto-send weekly summary.
    - cron: '30 0 * * *'
  workflow_dispatch:
    inputs:
      type:
        description: 'Notification type'
        required: false
        default: 'reminder'
        type: choice
        options:
          - reminder
          - weekly

permissions:
  contents: read
  id-token: write   # Required for Workload Identity Federation OIDC

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Wait until 03:30 UTC (05:30 SAST)
        if: github.event_name == 'schedule'
        run: |
          target=$(date -u -d "today 03:30" +%s)
          now=$(date -u +%s)
          if [ "$now" -lt "$target" ]; then
            echo "Sleeping $((target - now))s until 03:30 UTC (05:30 SAST)"
            sleep $((target - now))
          else
            echo "Runner started after 03:30 UTC (GitHub delay) — sending immediately"
          fi

      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/624011748994/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'firebase-adminsdk-fbsvc@pulzeiq-4669c.iam.gserviceaccount.com'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install firebase-admin supabase python-dotenv

      - name: Send notification
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            python notify.py --type ${{ github.event.inputs.type }}
          else
            python notify.py
          fi
